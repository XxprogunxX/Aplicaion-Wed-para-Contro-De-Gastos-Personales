name: CI/CD Main Pipeline

on:
  push:
    branches: [ master, develop, 'features/**' ]
  pull_request:
    branches: [ master, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  backend-ci:
    name: Backend Pipeline
    uses: ./.github/workflows/backend-ci.yml
    secrets: inherit

  frontend-ci:
    name: Frontend Pipeline
    uses: ./.github/workflows/frontend-ci.yml
    secrets: inherit

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: always()

    steps:
    - name: Check pipelines status
      run: |
        if [ "${{ needs.backend-ci.result }}" == "failure" ] || [ "${{ needs.frontend-ci.result }}" == "failure" ]; then
          echo "❌ CI/CD Pipeline failed"
          exit 1
        fi
        echo "✅ All pipelines passed"

    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const backendResult = '${{ needs.backend-ci.result }}';
          const frontendResult = '${{ needs.frontend-ci.result }}';
          
          let comment = '## CI/CD Status\n\n';
          comment += `- Backend: ${backendResult === 'success' ? '✅' : '❌'}\n`;
          comment += `- Frontend: ${frontendResult === 'success' ? '✅' : '❌'}\n`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
